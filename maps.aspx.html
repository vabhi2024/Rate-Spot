<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<title>Rate Spot || Maps</title>

<style>

body{
font-family:'poppins';
text-align:center;
background:#000;
}

h2{
margin-top:20px;
  color: white;
  font-family:'poppins';
}

.bar{
margin:10px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:6px;
color:white;
font-size:15px;
cursor:pointer;
  font-family:'poppins';
}

.diesel{background:darkviolet;}
.cng{background:#4caf50;}
.lpg{background:#2196f3;}
.mentha{background:#009688;}

iframe{
width:100%;
height:420px;
border:1px solid #000;
box-shadow: 0 0 2px 2px #ccc;  
margin-top:15px;
border-radius:8px;
}

</style>
</head>

<body>

<h2>Nearest Fuel Stations</h2>

<!-- Bar 1 -->
<div class="bar">
<button class="diesel" onclick="diesel()">Diesel or Petrol Pump</button>
<button class="cng" onclick="cng()">CNG Gas Station</button>
<button class="lpg" onclick="lpg()">LPG Gas Station</button>
<button class="mentha" onclick="mentha()">Mentha Oil Shop</button>
</div>

<iframe id="map"></iframe>

<script>

function diesel(){
document.getElementById("map").src="https://www.google.com/maps?q=diesel+petrol+pump+near+me&output=embed";
}

function cng(){
document.getElementById("map").src="https://www.google.com/maps?q=CNG+petrol+pump+near+me&output=embed";
}

function lpg(){
document.getElementById("map").src="https://www.google.com/maps?q=LPG+gas+agency+near+me&output=embed";
}

function mentha(){
document.getElementById("map").src="https://www.google.com/maps?q=mentha+oil+market+near+me&output=embed";
}

</script>
  <br><br><br>
  <a href="index.html"><button style="color:red">~ Back to Home</button></a>

</body>
</html>
